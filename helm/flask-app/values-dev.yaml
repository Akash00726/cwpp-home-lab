replicaCount: 2
namespace: cwpp-dev
image:
  repository: cwpplabacr.azurecr.io/cwpp-app
  tag: 50b7b2484276a003bbc033cda541ebaed9d6ff64
  pullPolicy: Never

service:
  type: ClusterIP
  port: 80
  targetPort: 5000
  name: flask-service-dev

config:
  name: flask-config-dev
  APP_NAME: "CWPP Dev"
  APP_ENV: "Development"
  APP_VERSION: "1.0"
  LOG_LEVEL: "INFO"

resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 500m
    memory: 256Mi

SecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

podsecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

  capabilities:
    drop:
      - ALL

probes:
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10

  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 20