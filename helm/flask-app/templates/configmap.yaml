apiVersion: v1
kind: ConfigMap

metadata:
  name: {{ .Values.config.name }} 

  labels:
{{ include "flask.labels" . | nindent 4 }}

data:

  APP_NAME: {{ .Values.config.APP_NAME | quote }}

  APP_ENV: {{ .Values.config.APP_ENV | quote }}

  APP_VERSION: {{ .Values.config.APP_VERSION | quote }}

  LOG_LEVEL: {{ .Values.config.LOG_LEVEL | quote }}