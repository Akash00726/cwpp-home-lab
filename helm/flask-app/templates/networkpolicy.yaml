apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: {{ include "flask.name" . }}-network-policy
  namespace: {{ .Release.Namespace }}

  labels:
{{ include "flask.labels" . | nindent 4 }}

spec:

  podSelector:

    matchLabels:
{{ include "flask.selectorLabels" . | nindent 6 }}


  policyTypes:

  - Ingress


  ingress:

  - from:

    - podSelector:

        matchLabels:

          access: allowed


    ports:

    - protocol: TCP

      port: 5000