name: CWPP Pipeline

on:
  push:
    branches:
      - main


jobs:

  build-scan-push:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Docker Build
      run: |

        docker build \
        -t ${{ secrets.ACR_LOGIN_SERVER }}/cwpp-app:${{ github.sha }} \
        ./app


    - name: Trivy Scan
      uses: aquasecurity/trivy-action@master

      with:
        image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/cwpp-app:${{ github.sha }}

        severity: HIGH,CRITICAL

        exit-code: 0


    - name: ACR Login

      run: |

        echo "${{ secrets.ACR_PASSWORD }}" | \
        docker login \
        ${{ secrets.ACR_LOGIN_SERVER }} \
        -u ${{ secrets.ACR_USERNAME }} \
        --password-stdin


    - name: Push Image

      run: |

        docker push \
        ${{ secrets.ACR_LOGIN_SERVER }}/cwpp-app:${{ github.sha }}